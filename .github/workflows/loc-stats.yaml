name: LOC Stats

on:
  schedule:
    - cron: '0 3 * * 0'   # weekly, Sunday 03:00 UTC
  workflow_dispatch:

jobs:
  update-loc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install tokei
        run: |
          cargo install --locked tokei
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Clone all repos and count LOC
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: |
          mkdir -p /tmp/repos
          # Fetch all non-fork repos (public + private with token)
          gh repo list $GH_USER --limit 100 --no-archived --json nameWithOwner -q '.[].nameWithOwner' \
            | while read repo; do
                git clone --depth=1 "https://oauth2:$GH_TOKEN@github.com/$repo.git" \
                  "/tmp/repos/$(basename $repo)" 2>/dev/null || true
              done
          # Run tokei across all of them, output JSON
          tokei /tmp/repos --output json > /tmp/tokei.json

      - name: Update README
        run: python3 .github/scripts/update_readme.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update LOC stats"
          git push
