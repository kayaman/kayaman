name: LOC Stats

on:
  push:
    branches:
      - main

jobs:
  loc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install tokei
        run: |
          cargo install --locked tokei
          export PATH="$HOME/.cargo/bin:$PATH"
          tokei --version

      - name: Collect LOC Stats
        run: tokei .

      - name: Collect timeline
        env:
          GH_TOKEN:    ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_EMAIL:    ${{ secrets.GH_EMAIL }}
          WEEKS_BACK:  "18"
        run: python3 scripts/collect_timeline.py
   
      - name: Render SVG
        run: python3 scripts/render_svg.py
 
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/loc_chart.svg
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update LOC chart"
          git push
 
      - name: Update README
        env:
          GH_TOKEN:    ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: python3 scripts/update_readme.py
