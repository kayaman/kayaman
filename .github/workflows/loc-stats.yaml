name: LOC Stats

on:
  push:
    branches:
      - main

jobs:
  loc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install tokei
        run: |
          cargo install --locked tokei
          export PATH="$HOME/.cargo/bin:$PATH"
          tokei --version

      - name: Collect LOC Stats
        run: tokei .
